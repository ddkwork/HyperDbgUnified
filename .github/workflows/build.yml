name: HyperDbg Build

on:
  push:
    branches:
      - master
      - dev
  pull_request:
    branches:
      - master
      - dev
  workflow_dispatch:
  schedule:
    - cron: '0 */6 * * *'

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@v6

    - name: Clone HyperDbg repository
      run: |
        git clone --recursive -b dev https://github.com/HyperDbg/HyperDbg.git HyperDbg

    - name: Get HyperDbg commit info
      id: hyperdbg_info
      working-directory: HyperDbg
      run: |
        echo "commit=$(git rev-parse HEAD)" >> $GITHUB_OUTPUT
        echo "date=$(git log -1 --format=%cd --date=short)" >> $GITHUB_OUTPUT

    - name: Clone ddkwork/ewdk repository
      run: |
        git clone --depth 1 https://github.com/ddkwork/ewdk.git ewdk

    - name: Install Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.26.x'

    - name: Setup EWDK environment
      working-directory: ewdk
      run: |
        go run .

    - name: Copy ewdk.cmake to project root
      run: |
        Copy-Item "C:\Program Files\CMake\bin\ewdk.cmake" -Destination .

    - name: Configure CMake (Release)
      run: |
        cmake -B build -G "Ninja" -DCMAKE_BUILD_TYPE=Release .

    - name: Build Release
      run: |
        cmake --build build --config Release

    - name: Configure CMake (Debug)
      run: |
        cmake -B build_debug -G "Ninja" -DCMAKE_BUILD_TYPE=Debug .

    - name: Build Debug
      run: |
        cmake --build build_debug --config Debug

    - name: Collect build artifacts
      run: |
        mkdir artifacts
        Get-ChildItem -Path build -Recurse -Include *.sys,*.pdb,*.dll,*.exe | Copy-Item -Destination artifacts
        Get-ChildItem -Path build_debug -Recurse -Include *.sys,*.pdb,*.dll,*.exe | Copy-Item -Destination artifacts

    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: HyperDbg-Build
        path: artifacts/*

    - name: Create source archive
      run: |
        7z a -tzip HyperDbg-Source.zip HyperDbg\

    - name: Upload source archive
      uses: actions/upload-artifact@v4
      with:
        name: HyperDbg-Source
        path: HyperDbg-Source.zip

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@v6

    - name: Download all artifacts
      uses: actions/download-artifact@v4

    - name: Display structure of downloaded files
      run: ls -R

    - name: Get commit info
      id: info
      run: |
        echo "date=$(date +%Y-%m-%d)" >> $GITHUB_OUTPUT
        echo "commit=$(git rev-parse HEAD)" >> $GITHUB_OUTPUT

    - name: Delete existing release
      uses: dev-drprasad/delete-older-releases@v0.3.4
      with:
        keep_latest: 0
        delete_tag_pattern: latest
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Create Release
      uses: softprops/action-gh-release@v3
      with:
        tag_name: latest
        name: HyperDbg Build - Latest
        files: |
          HyperDbg-Source/*
          HyperDbg-Build/*
        body: |
          HyperDbg dev branch build

          Build Date: ${{ steps.info.outputs.date }}
          Unified Repo Commit: ${{ steps.info.outputs.commit }}

          Automatically updated with each successful run.
        draft: false
        prerelease: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
